<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OverLex Settings</title>
    <!-- TODO: Settings form - hotkeys, languages, engine selection -->
    <style>
        body { font-family: sans-serif; padding: 20px; }
        h1 { margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; }
        button { padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>
    <!-- 
        Settings Panel:
        - OCR hotkey configuration
        - Write mode hotkey configuration
        - Source/target language selection
        - Translation engine selection
        - API key input (for premium engines)
        - Overlay position and timeout
        - Start with Windows toggle
    -->
    <h1>OverLex Settings</h1>
    
    <div class="form-group">
        <label for="ocr-hotkey">OCR Hotkey</label>
        <input type="text" id="ocr-hotkey" value="CTRL+SHIFT+T" />
    </div>
    
    <div class="form-group">
        <label for="write-hotkey">Write Mode Hotkey</label>
        <input type="text" id="write-hotkey" value="CTRL+SHIFT+W" />
    </div>
    
    <div class="form-group">
        <label for="source-lang">Source Language</label>
        <select id="source-lang">
            <option value="auto">Auto-detect</option>
            <option value="en">English</option>
            <option value="es">Spanish</option>
        </select>
    </div>
    
    <div class="form-group">
        <label for="target-lang">Target Language</label>
        <select id="target-lang">
            <option value="es" selected>Spanish</option>
            <option value="en">English</option>
        </select>
    </div>
    
    <div class="form-group">
        <label for="engine">Translation Engine</label>
        <select id="engine">
            <option value="libretranslate" selected>LibreTranslate (Free)</option>
            <option value="deepl">DeepL</option>
            <option value="google">Google Translate</option>
        </select>
    </div>
    
    <div class="form-group">
        <label for="api-key">API Key (optional)</label>
        <input type="password" id="api-key" placeholder="Enter API key for premium engines" />
    </div>
    
    <div class="form-group">
        <label for="overlay-position">Overlay Position</label>
        <select id="overlay-position">
            <option value="near-selection">Near Selection</option>
            <option value="top-left">Top Left</option>
            <option value="top-right">Top Right</option>
            <option value="bottom-left">Bottom Left</option>
            <option value="bottom-right">Bottom Right</option>
        </select>
    </div>
    
    <div class="form-group">
        <label for="overlay-timeout">Auto-dismiss Timeout (ms)</label>
        <input type="number" id="overlay-timeout" value="5000" />
    </div>
    
    <div class="form-group">
        <label>
            <input type="checkbox" id="start-with-windows" /> Start with Windows
        </label>
    </div>
    
    <button id="save-btn">Save Settings</button>
    
    <script src="settings.js"></script>
</body>
</html>
