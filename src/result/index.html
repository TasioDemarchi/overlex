<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OverLex Result</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: rgba(15, 15, 15, 0.92);
            color: #fff;
            padding: 12px 16px;
            min-width: 200px;
            max-width: 500px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            user-select: text;
        }
        #original {
            font-size: 12px;
            color: #999;
            margin-bottom: 6px;
            line-height: 1.3;
        }
        #translated {
            font-size: 16px;
            color: #fff;
            line-height: 1.4;
        }
        #dismiss-btn {
            position: absolute;
            top: 4px;
            right: 8px;
            background: none;
            border: none;
            color: #666;
            font-size: 16px;
            cursor: pointer;
        }
        #dismiss-btn:hover { color: #fff; }
        #error { color: #ff6b6b; font-size: 13px; display: none; }
        #loading { color: #888; font-size: 13px; }
    </style>
</head>
<body>
    <button id="dismiss-btn">&times;</button>
    <div id="loading">Translating...</div>
    <div id="original"></div>
    <div id="translated"></div>
    <div id="error"></div>
    <script src="result.js"></script>
</body>
</html>
