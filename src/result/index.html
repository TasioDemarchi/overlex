<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OverLex Result</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { background: transparent; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: transparent;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #app-wrapper {
            position: fixed;
            inset: 0;
            background: rgba(13, 17, 23, 0.82);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Header with drag + close */
        #drag-bar {
            height: 32px;
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 8px;
            flex-shrink: 0;
        }

        #dismiss-btn {
            background: none;
            border: none;
            color: #666;
            font-size: 16px;
            cursor: pointer;
            -webkit-app-region: no-drag;
        }
        #dismiss-btn:hover { color: #fff; }

        /* Language indicator in header */
        #lang-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            -webkit-app-region: no-drag;
        }

        #lang-display {
            font-size: 11px;
            color: #888;
            font-weight: 500;
            text-transform: uppercase;
        }

        #swap-btn {
            background: none;
            border: none;
            color: #666;
            font-size: 14px;
            cursor: pointer;
            padding: 2px 4px;
            border-radius: 2px;
            transition: color 0.15s, background 0.15s;
        }
        #swap-btn:hover {
            color: #fff;
            background: rgba(255,255,255,0.1);
        }

        /* Main content area - scrollable */
        #content {
            flex: 1;
            overflow-y: auto;
            padding: 8px 16px;
            user-select: text;
        }

        #content::-webkit-scrollbar { width: 4px; }
        #content::-webkit-scrollbar-track { background: transparent; }
        #content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

        /* Translated text - MAIN area */
        #translated {
            font-size: 15px;
            color: #fff;
            white-space: pre-wrap;
            line-height: 1.5;
        }

        /* Error */
        #error {
            color: #ff6b6b;
            font-size: 13px;
            display: none;
        }

        /* Loading */
        #loading {
            color: #888;
            font-size: 13px;
        }
        #loading::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }
        @keyframes dots {
            0%   { content: ''; }
            25%  { content: '.'; }
            50%  { content: '..'; }
            75%  { content: '...'; }
            100% { content: ''; }
        }

        /* Original section - collapsed at bottom */
        #original-section {
            border-top: 1px solid rgba(255,255,255,0.08);
            padding: 4px 16px 8px;
            flex-shrink: 0;
        }

        #original-toggle {
            font-size: 11px;
            color: #555;
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 0;
        }
        #original-toggle:hover { color: #888; }

        /* Original text - hidden by default */
        #original {
            font-size: 11px;
            color: #666;
            white-space: pre-wrap;
            line-height: 1.3;
            max-height: 80px;
            overflow-y: auto;
            display: none;
            margin-top: 4px;
        }

        #original::-webkit-scrollbar { width: 4px; }
        #original::-webkit-scrollbar-track { background: transparent; }
        #original::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

        /* Progress bar for auto-dismiss */
        #dismiss-progress {
            height: 3px;
            background: #4e9af1;
            width: 100%;
            flex-shrink: 0;
            transition: width 50ms linear;
            display: none;
        }
    </style>
</head>
<body>
    <div id="app-wrapper">
        <div id="dismiss-progress"></div>
        <div id="drag-bar">
            <div id="lang-indicator">
                <span id="lang-display">AUTO → ES</span>
                <button id="swap-btn" title="Swap languages (Ctrl+Shift+←)">⇄</button>
            </div>
            <button id="dismiss-btn">&times;</button>
        </div>
        <div id="content">
            <div id="loading">Translating</div>
            <div id="translated"></div>
            <div id="error"></div>
        </div>
        <div id="original-section">
            <button id="original-toggle">▶ Original</button>
            <div id="original"></div>
        </div>
    </div>
    <script src="result.js"></script>
</body>
</html>
