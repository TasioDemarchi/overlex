<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freeze Overlay</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        canvas {
            display: block;
            cursor: crosshair;
            width: 100vw;
            height: 100vh;
            background: #000;
        }
    </style>
</head>
<body>
    <canvas id="freeze-canvas"></canvas>
    <script src="freeze.js"></script>
</body>
</html>
