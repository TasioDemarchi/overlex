<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Write Mode</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { background: transparent; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: transparent;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #app-wrapper {
            position: fixed;
            inset: 0;
            background: transparent;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Header with close button */
        #header {
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 0 4px;
            cursor: grab;
            -webkit-app-region: drag;
        }

        #close-btn {
            background: none;
            border: none;
            color: #666;
            font-size: 16px;
            cursor: pointer;
        }
        #close-btn:hover { color: #fff; }

        /* Chat History */
        #chat-history {
            flex: 1;
            overflow-y: auto;
            padding: 0 16px;
            display: flex;
            flex-direction: column;
            scroll-behavior: smooth;
        }

        #chat-history::-webkit-scrollbar { width: 4px; }
        #chat-history::-webkit-scrollbar-track { background: transparent; }
        #chat-history::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

        /* Each translation entry */
        .message-entry {
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            animation: fadeIn 0.2s ease-out;
        }
        .message-entry:last-child { border-bottom: none; }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .original-text {
            font-size: 12px;
            color: #999;
            margin-bottom: 6px;
            line-height: 1.3;
        }

        .translated-text {
            font-size: 16px;
            color: #fff;
            line-height: 1.4;
        }

        .detected-lang {
            font-size: 11px;
            color: #555;
            margin-top: 4px;
        }

        .error-text {
            font-size: 13px;
            color: #ff6b6b;
            line-height: 1.4;
        }

        .loading-text {
            font-size: 13px;
            color: #888;
        }
        .loading-text::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }
        @keyframes dots {
            0%   { content: ''; }
            25%  { content: '.'; }
            50%  { content: '..'; }
            75%  { content: '...'; }
            100% { content: ''; }
        }

        /* Input Area */
        #input-container {
            padding: 10px 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        #write-input {
            width: 100%;
            padding: 10px 14px;
            font-size: 14px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 4px;
            background: rgba(255,255,255,0.05);
            color: #fff;
            outline: none;
            font-family: inherit;
        }
        #write-input:focus {
            border-color: rgba(255,255,255,0.3);
        }
        #write-input::placeholder { color: #666; }
        #write-input:disabled { opacity: 0.5; }

        /* Empty State */
        .empty-state {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div id="app-wrapper">
        <div id="header">
            <button id="close-btn">&times;</button>
        </div>
        <div id="chat-history">
            <div class="empty-state">Type text and press Enter to translate...</div>
        </div>
        <div id="input-container">
            <input type="text" id="write-input" placeholder="Type text to translate..." autocomplete="off" />
        </div>
    </div>
    <script src="write.js"></script>
</body>
</html>
